<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer Profit Calculator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">
<h1>🌾 AgroProfit</h1>
</header>

<div class="main-container">

<div class="card">

<h2>Farmer Profit Calculator</h2>

<form id="profitForm">

<input type="text" id="crop" placeholder="Crop Name" required>

<input type="number" id="cost" placeholder="Total Cost ₹" required>

<input type="number" id="price" placeholder="Selling Price ₹" required>

<button type="submit">Calculate</button>

</form>

<div id="result"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
